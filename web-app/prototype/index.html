function setTheme(t) {
  state.theme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('cd-theme', t);
}

setTheme(state.theme);

/* ==========================================================================
   HELPERS
   ========================================================================== */
function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return [...(root || document).querySelectorAll(sel)]; }

function genId() {
  return 'usr_' + Math.random().toString(36).slice(2, 10);
}

function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const icons = { success: '\u2713', error: '\u2717', info: '\u2139' };
  const el = document.createElement('div');
  el.className = 'toast toast--' + type;
  el.innerHTML = '<span class="toast__icon">' + (icons[type] || '') + '</span><span class="toast__message">' + msg + '</span><button class="toast__close" onclick="this.parentElement.remove()">\u00d7</button>';
  c.appendChild(el);
  setTimeout(() => { el.style.animation = 'toast-out .26s ease forwards'; setTimeout(() => el.remove(), 300); }, 3500);
}

function render(html) {
  document.getElementById('app').innerHTML = html;
}

function navigate(page) {
  state.currentPage = page;
  route();
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function togglePassword(btn) {
  const wrap = btn.closest('.password-field');
  const inp = wrap.querySelector('input');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '\u25CF' : '\u25CB';
}

function toggleUserMenu() {

  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}

function toggleNotifDropdown() {

  const wasHidden = dd.style.display === 'none';
  dd.style.display = wasHidden ? 'block' : 'none';
  document.getElementById('user-dropdown').style.display = 'none';
}

function toggleMobileNav() {
  const container = document.getElementById('mobile-nav-container');
  if (container.children.length > 0) {
    container.innerHTML = '';
    return;
  }
  const currentPage = state.page || 'tasks';
  const navItems = [
    { id: 'tasks', label: 'Задачи' },
    { id: 'dashboard', label: 'Дашборд' },
    { id: 'courses', label: 'Курсы' },
    { id: 'community', label: 'Сообщество' }
  ];
  const itemsHtml = navItems.map(function(item) {
    const active = currentPage === item.id ? ' mobile-nav__item--active' : '';
    return '<button class="mobile-nav__item' + active + '" onclick="navigate(\'' + item.id + '\'); document.getElementById(\'mobile-nav-container\').innerHTML = \'\'">' + item.label + '</button>';
  }).join('');
  container.innerHTML = '<div class="mobile-nav-overlay" onclick="document.getElementById(\'mobile-nav-container\').innerHTML = \'\'"></div><div class="mobile-nav">' + itemsHtml + '</div>';

function showAvatarModal(initials) {
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = '<div class="modal" style="max-width:320px;text-align:center"><div class="modal__header"><h2 class="modal__title">Аватар</h2><button class="modal__close" onclick="this.closest(\'.modal-overlay\').remove()">\u00d7</button></div><div class="modal__body" style="display:flex;justify-content:center;padding:var(--cd-space-8) 0"><span class="app-header__avatar" style="width:120px;height:120px;font-size:3rem;border-radius:50%">' + initials + '</span></div></div>';
  document.body.appendChild(overlay);

function openSearchModal() {
  const existing = document.querySelector('.search-modal-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'search-modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

  var searchState = { query: '', focusedIdx: 0 };

  var allItems = [
    { group: 'Разделы', icon: '📋', label: 'Задачи', hint: 'Раздел', action: 'navigate("tasks")' },
    { group: 'Разделы', icon: '📊', label: 'Дашборд', hint: 'Раздел', action: 'navigate("dashboard")' },
    { group: 'Разделы', icon: '📚', label: 'Курсы', hint: 'Раздел', action: 'navigate("courses")' },
    { group: 'Разделы', icon: '💬', label: 'Сообщество', hint: 'Раздел', action: 'navigate("community")' },
    { group: 'Настройки', icon: '⚙', label: 'Профиль', hint: 'Страница', action: 'navigate("settings-profile")' },
    { group: 'Настройки', icon: '🔒', label: 'Безопасность', hint: 'Страница', action: 'navigate("settings-security")' }
  ];

  function getFiltered() {
    if (!searchState.query) return allItems;
    var q = searchState.query.toLowerCase();
    return allItems.filter(function(item) {
      return item.label.toLowerCase().indexOf(q) !== -1 || item.group.toLowerCase().indexOf(q) !== -1;
    });
  }

  function renderResults() {
    var results = getFiltered();
    var resultsEl = overlay.querySelector('.search-modal__results');
    if (results.length === 0) {
      resultsEl.innerHTML = '<div class="search-modal__empty">' +
        '<div class="search-modal__empty-icon">🔍</div>' +
        '<div class="search-modal__empty-text">Ничего не найдено</div>' +
        '<div class="search-modal__empty-hint">Попробуйте другой запрос</div>' +
      '</div>';
      return;
    }
    searchState.focusedIdx = Math.min(searchState.focusedIdx, results.length - 1);
    var groups = {};
    var groupOrder = [];
    results.forEach(function(item) {
      if (!groups[item.group]) {
        groups[item.group] = [];
        groupOrder.push(item.group);
      }
      groups[item.group].push(item);
    });
    var html = '';
    groupOrder.forEach(function(group) {
      html += '<div class="search-modal__group">';
      html += '<div class="search-modal__group-title">' + group + '</div>';
      groups[group].forEach(function(item) {
        var globalIdx = results.indexOf(item);
        var focused = globalIdx === searchState.focusedIdx ? ' search-modal__item--focused' : '';
        html += '<div class="search-modal__item' + focused + '" data-idx="' + globalIdx + '" onclick="' + item.action + '; overlay.remove()">' +
          '<div class="search-modal__item-icon">' + item.icon + '</div>' +
          '<div class="search-modal__item-label">' + item.label + '</div>' +
          '<div class="search-modal__item-hint">' + item.hint + '</div>' +
        '</div>';
      });
      html += '</div>';
    });
    resultsEl.innerHTML = html;
  }

  overlay.innerHTML = '<div class="search-modal">' +
    '<div class="search-modal__input-wrap">' +
      '<svg class="search-modal__input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>' +
      '<input class="search-modal__input" id="search-modal-input" type="text" placeholder="Поиск задач, страниц, настроек..." />' +
      '<button class="search-modal__input-clear" onclick="document.getElementById(\'search-modal-input\').value=\'\'; searchState.query=\'\'; searchState.focusedIdx=0; renderResults();" title="Очистить">\u00d7</button>' +
      '<span class="search-modal__input-shortcut">ESC</span>' +
    '</div>' +
    '<div class="search-modal__results"></div>' +
    '<div class="search-modal__footer">' +
      '<span><kbd>\u2191</kbd><kbd>\u2193</kbd> навигация</span>' +
      '<span><kbd>\u21B5</kbd> выбрать</span>' +
      '<span><kbd>esc</kbd> закрыть</span>' +
    '</div>' +
  '</div>';

  document.body.appendChild(overlay);
  var input = document.getElementById('search-modal-input');
  input.focus();

  input.addEventListener('input', function() {
    searchState.query = input.value;
    searchState.focusedIdx = 0;
    renderResults();
  });

  input.addEventListener('keydown', function(e) {
    var results = getFiltered();
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      searchState.focusedIdx = Math.min(searchState.focusedIdx + 1, results.length - 1);
      renderResults();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      searchState.focusedIdx = Math.max(searchState.focusedIdx - 1, 0);
      renderResults();
    } else if (e.key === 'Enter' && results[searchState.focusedIdx]) {
      e.preventDefault();
      var item = results[searchState.focusedIdx];
      overlay.remove();
      eval(item.action);
    }
  });

  renderResults();
}

document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openSearchModal();
  }
  if (e.key === 'Escape') {
    const searchOverlay = document.querySelector('.search-modal-overlay');
    if (searchOverlay) searchOverlay.remove();
    document.getElementById('user-dropdown').style.display = 'none';
    document.getElementById('notif-dropdown').style.display = 'none';
    document.getElementById('mobile-nav-container').innerHTML = '';
  }
});

document.addEventListener('click', function(e) {
  const dd = document.getElementById('user-dropdown');
  const btn = document.querySelector('.app-header__user-btn');
  if (dd && !dd.contains(e.target) && btn && !btn.contains(e.target)) {
    dd.style.display = 'none';
  }
  const notifDd = document.getElementById('notif-dropdown');
  const notifBtn = document.querySelector('.app-header__notif-btn');
  if (notifDd && !notifDd.contains(e.target) && notifBtn && !notifBtn.contains(e.target)) {
    notifDd.style.display = 'none';
  }
});

function settingsSidebar(active) {
  const items = [];
  if (active === 'settings-profile') {
    items.push({ id: 'settings-profile', label: 'Профиль' });
  } else if (active === 'settings-security') {
    items.push({ id: 'settings-security', label: 'Безопасность' });
  }
  return '<aside class="settings-sidebar"><nav class="settings-sidebar__nav">' +
    items.map(i => '<button class="settings-sidebar__item' + (active === i.id ? ' settings-sidebar__item--active' : '') + '" onclick="navigate(\'' + i.id + '\')">' + i.label + '</button>').join('') +
    '</nav></aside>';
}

const TASKS_API_LIMIT = 20;
let taskLayoutRunId = 0;

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, function(ch) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[ch];
  });
}

function jsArg(value) {
  return "'" + String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'";
}

function getTaskFilters() {
  if (!state.taskFilters) {
    state.taskFilters = { type: 'all', language: [], level: 'all', tags: [], search: '' };
  }
  if (!Array.isArray(state.taskFilters.language)) state.taskFilters.language = [];
  return state.taskFilters;
}

function getUniqueTaskValues(getter) {
  const values = [];
  MOCK_TASKS.forEach(task => {
    const value = getter(task);
    if (Array.isArray(value)) {
      value.forEach(item => { if (!values.includes(item)) values.push(item); });
    } else if (value && !values.includes(value)) {
      values.push(value);
    }
  });
  return values.sort((a, b) => String(a).localeCompare(String(b)));
}

function setTaskFilter(name, value) {
  getTaskFilters()[name] = value;
  applyTaskFilters();
}

function handleTaskSearch(value) {
  getTaskFilters().search = value;
  renderTaskTiles();
}

function toggleTaskTag(tag) {
  const filters = getTaskFilters();
  const tags = filters.tags || [];
  filters.tags = tags.includes(tag) ? tags.filter(item => item !== tag) : tags.concat(tag);
  applyTaskFilters();
}

function toggleTaskLanguage(lang) {
  const filters = getTaskFilters();
  const langs = filters.language || [];
  filters.language = langs.includes(lang) ? langs.filter(item => item !== lang) : langs.concat(lang);
  applyTaskFilters();
}

function clearTaskFilters() {
  state.taskFilters = { type: 'all', language: [], level: 'all', tags: [], search: '' };
  applyTaskFilters(true);
}

function hasActiveTaskFilters() {
  const filters = getTaskFilters();
  return filters.type !== 'all' || (filters.language && filters.language.length > 0) || filters.level !== 'all' || (filters.tags && filters.tags.length > 0) || (filters.search && filters.search.length > 0);
}

function getFilteredTasks() {
  const filters = getTaskFilters();
  return MOCK_TASKS.filter(task => {
    if (filters.type !== 'all' && task.type !== filters.type) return false;
    if (filters.language && filters.language.length > 0 && !filters.language.includes(task.language)) return false;
    if (filters.level !== 'all' && task.complexity !== filters.level) return false;
    if (filters.tags && filters.tags.length && !filters.tags.every(tag => task.tags.includes(tag))) return false;
    if (filters.search && filters.search.length > 0) {
      const q = filters.search.toLowerCase();
      const haystack = (task.title + ' ' + task.description + ' ' + task.language + ' ' + task.tags.join(' ')).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function applyTaskFilters(closeDetails) {
  if (state.currentPage !== 'tasks' || !document.querySelector('.tasks-sidebar')) {
    route();
    return;
  }

  updateTaskFilterControls(closeDetails);
  renderTaskTiles();
}

function recalcSegmentedControls() {
  $$('.tasks-segmented').forEach(control => {
    const buttons = $$('[data-segmented-button]', control);
    const indicator = $('.tasks-segmented__indicator', control);
    const active = $('.tasks-segmented__item--active', control);
    if (!buttons.length || !indicator || !active) return;

    const wrapped = buttons[buttons.length - 1].offsetTop !== buttons[0].offsetTop;
    control.classList.toggle('tasks-segmented--wrapped', wrapped);
    if (wrapped) return;

    indicator.style.left = active.offsetLeft + 'px';
    indicator.style.width = active.offsetWidth + 'px';
  });
}

function updateTaskFilterControls(closeDetails) {
  const filters = getTaskFilters();

  $$('[data-task-filter]').forEach(btn => {
    const name = btn.dataset.taskFilter;
    const active = filters[name] === btn.dataset.filterValue;
    btn.classList.toggle('tasks-segmented__item--active', active && name === 'type');
    btn.classList.toggle('tasks-level-option--active', active && name === 'level');
    btn.setAttribute('aria-selected', active ? 'true' : 'false');
  });

  $$('[data-task-language]').forEach(btn => {
    const lang = btn.dataset.taskLanguage;
    const active = (filters.language || []).includes(lang);
    btn.classList.toggle('tasks-filter-row--active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });

  $$('[data-task-tag]').forEach(btn => {
    const active = (filters.tags || []).includes(btn.dataset.taskTag);
    btn.classList.toggle('tasks-tag-filter--active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });

  const languageSummary = $('[data-filter-summary="language"]');
  if (languageSummary) {
    const langs = filters.language || [];
    languageSummary.textContent = langs.length ? langs.length + ' выбрано' : 'Любой';
  }

  const levelDropdownValue = document.querySelector('[data-dropdown-trigger="level"] .tasks-dropdown__value');
  if (levelDropdownValue) {
    levelDropdownValue.textContent = filters.level === 'all' ? 'Уровень' : filters.level;
  }
  const levelTrigger = document.querySelector('[data-dropdown-trigger="level"]');
  if (levelTrigger) {
    levelTrigger.classList.toggle('tasks-dropdown__trigger--active', filters.level !== 'all');
  }
  $$('[data-dropdown-menu="level"] [data-task-filter="level"]').forEach(btn => {
    const active = filters.level === btn.dataset.filterValue;
    btn.classList.toggle('tasks-dropdown__item--active', active);
  });

  const searchInput = $('[data-task-search]');
  if (searchInput && document.activeElement !== searchInput) {
    searchInput.value = filters.search || '';
  }
  const searchClear = $('[data-search-clear]');
  if (searchClear) searchClear.classList.toggle('tasks-search__clear--visible', !!(filters.search && filters.search.length > 0));
  const searchPlaceholder = $('[data-search-placeholder]');
  if (searchPlaceholder) searchPlaceholder.textContent = (filters.search && filters.search.length > 0) ? '' : '';

  const tagsSummary = $('[data-filter-summary="tags"]');
  if (tagsSummary) tagsSummary.textContent = filters.tags && filters.tags.length ? filters.tags.length + ' выбрано' : 'Выбрать';

  const clearBtn = $('.tasks-filters__clear');
  if (clearBtn) clearBtn.hidden = !hasActiveTaskFilters();

  if (closeDetails) {
    $$('.tasks-filter-card[open]').forEach(details => { details.open = false; });
    closeAllDropdowns();
  }

  recalcSegmentedControls();
}

function listTasksFromApi(limit) {
  return Promise.resolve(getFilteredTasks().slice(0, limit));
}

function inlineMarkdown(text) {
  return escapeHtml(text)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
}

function renderMarkdown(markdown) {
  if (!markdown) {
    return '<div class="task-tz-empty"><h3>ТЗ пока не добавлено</h3><p>Полное условие появится здесь, когда будет передано.</p></div>';
  }

  var lines = markdown.replace(/\r\n/g, '\n').split('\n');
  var html = [];
  var inCode = false;
  var codeLang = '';
  var codeLines = [];
  var listType = null;
  var paragraph = [];

  function flushParagraph() {
    if (paragraph.length) {
      html.push('<p>' + inlineMarkdown(paragraph.join(' ').replace(/  +/g, ' ')) + '</p>');
      paragraph = [];
    }
  }

  function closeList() {
    if (listType) { html.push('</' + listType + '>'); listType = null; }
  }

  function openList(type) {
    if (listType !== type) { closeList(); html.push('<' + type + '>'); listType = type; }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var fence = line.match(/^```\s*([\w-]+)?\s*$/);
    if (fence) {
      flushParagraph(); closeList();
      if (!inCode) {
        inCode = true; codeLang = fence[1] || ''; codeLines = [];
      } else {
        var langAttr = codeLang ? ' data-lang="' + escapeHtml(codeLang) + '"' : '';
        html.push('<pre' + langAttr + '><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
        inCode = false; codeLang = ''; codeLines = [];
      }
      continue;
    }
    if (inCode) { codeLines.push(line); continue; }
    if (!line.trim()) { flushParagraph(); closeList(); continue; }

    var heading = line.match(/^(#{1,4})\s+(.+)$/);
    if (heading) {
      flushParagraph(); closeList();
      var level = heading[1].length;
      html.push('<h' + level + '>' + inlineMarkdown(heading[2]) + '</h' + level + '>');
      continue;
    }
    if (/^---+$/.test(line.trim())) { flushParagraph(); closeList(); html.push('<hr />'); continue; }

    var unordered = line.match(/^[-*]\s+(.+)$/);
    if (unordered) { flushParagraph(); openList('ul'); html.push('<li>' + inlineMarkdown(unordered[1]) + '</li>'); continue; }

    var ordered = line.match(/^\d+\.\s+(.+)$/);
    if (ordered) { flushParagraph(); openList('ol'); html.push('<li>' + inlineMarkdown(ordered[1]) + '</li>'); continue; }

    var quote = line.match(/^>\s?(.+)$/);
    if (quote) { flushParagraph(); closeList(); html.push('<blockquote>' + inlineMarkdown(quote[1]) + '</blockquote>'); continue; }

    paragraph.push(line.trim());
  }

  if (inCode) html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
  flushParagraph(); closeList();
  return html.join('\n');
}

let searchPlaceholderTimer = null;
function initSearchPlaceholder() {
  if (searchPlaceholderTimer) { clearTimeout(searchPlaceholderTimer); searchPlaceholderTimer = null; }
  var phrases = ['\u041f\u043e\u0438\u0441\u043a \u0437\u0430\u0434\u0430\u0447...', 'Redis \u043a\u044d\u0448\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435', 'REST API', 'WebSocket', '\u041c\u0438\u0433\u0440\u0430\u0446\u0438\u0438 \u0411\u0414', 'CI/CD pipeline', '\u0422\u0435\u0433: database', '\u0422\u0435\u0433: react'];
  var idx = 0, charIdx = 0, deleting = false;
  var input = document.querySelector('[data-task-search]');
  var ph = document.querySelector('[data-search-placeholder]');
  if (!input || !ph) return;
  function tick() {
    if (document.activeElement === input || input.value) { ph.textContent = ''; return; }
    var word = phrases[idx];
    if (!deleting) {
      charIdx++;
      if (charIdx > word.length) { setTimeout(function() { deleting = true; tick(); }, 1400); return; }
    } else {
      charIdx--;
      if (charIdx < 0) { deleting = false; idx = (idx + 1) % phrases.length; searchPlaceholderTimer = setTimeout(tick, 400); return; }
    }
    ph.textContent = word.slice(0, charIdx);
    searchPlaceholderTimer = setTimeout(tick, deleting ? 35 : 70);
  }
  input.addEventListener('focus', function() { ph.textContent = ''; });
  input.addEventListener('blur', function() { if (!input.value) tick(); });
  tick();
}

function toggleDropdown(name) {
  var menu = document.querySelector('[data-dropdown-menu="' + name + '"]');
  if (!menu) return;
  var isOpen = !menu.hidden;
  closeAllDropdowns();
  if (!isOpen) {
    menu.hidden = false;
    document.addEventListener('click', onDropdownOutsideClick, { once: true, capture: true });
  }
}

function closeDropdown(name) {
  var menu = document.querySelector('[data-dropdown-menu="' + name + '"]');
  if (menu) menu.hidden = true;
}

function closeAllDropdowns() {
  $$('[data-dropdown-menu]').forEach(function(m) { m.hidden = true; });
}

function onDropdownOutsideClick(e) {
  if (!e.target.closest('[data-dropdown]')) {
    closeAllDropdowns();
  }
}

/* ==========================================================================
   MODAL HELPER
   ========================================================================== */

function renderModal(title, body, step) {
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  const stepsHtml = step ? '<div class="auth-steps">' + [1,2,3,4].map(s => '<div class="auth-steps__step' + (s < step ? ' auth-steps__step--done' : s === step ? ' auth-steps__step--active' : '') + '"></div>').join('') + '</div>' : '';
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = '<div class="modal"><div class="modal__header"><h2 class="modal__title">' + title + '</h2><button class="modal__close" onclick="closeModal()">\u00d7</button></div>' + stepsHtml + '<div class="modal__body">' + body + '</div></div>';
  document.body.appendChild(overlay);
  // setup code input
  setTimeout(setupCodeInput, 50);
}

function closeModal() {
  const m = document.querySelector('.modal-overlay');
  if (m) m.remove();
}

/* ==========================================================================
   CODE INPUT SETUP
   ========================================================================== */

function setupCodeInput() {
  const cells = $$('.code-input__cell');
  cells.forEach((cell, i) => {
    cell.addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '').slice(0, 1);
      if (this.value && i < cells.length - 1) cells[i + 1].focus();
    });
    cell.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && i > 0) {
        cells[i - 1].focus();
        cells[i - 1].value = '';
      }
    });
    cell.addEventListener('paste', function(e) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
      text.split('').forEach((ch, j) => { if (cells[j]) cells[j].value = ch; });
      if (text.length > 0) cells[Math.min(text.length, cells.length - 1)].focus();
    });
  });
}

  btn.textContent = 'Повторно через ' + String(sec).padStart(2, '0') + ':' + '00';
  const iv = setInterval(() => {
    sec--;
    btn.textContent = 'Повторно через ' + String(Math.floor(sec/60)).padStart(2,'0') + ':' + String(sec%60).padStart(2,'0');
    if (sec <= 0) { clearInterval(iv); btn.disabled = false; btn.textContent = 'Отправить код ещё раз'; toast('Код отправлен повторно', 'success'); }
  }, 1000);
}

function checkPasswordReqs(val) {
  toggleReq('req-len', val.length >= 8);
  toggleReq('req-upper', /[A-ZА-ЯЁ]/.test(val));
  toggleReq('req-num', /[0-9]/.test(val));
}

function checkPasswordReqsReset(val) {
  toggleReq('req-len-r', val.length >= 8);
  toggleReq('req-upper-r', /[A-ZА-ЯЁ]/.test(val));
  toggleReq('req-num-r', /[0-9]/.test(val));
}

function toggleReq(id, met) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'password-requirements__item ' + (met ? 'password-requirements__item--met' : 'password-requirements__item--unmet');
  el.querySelector('.password-requirements__icon').textContent = met ? '\u2713' : '\u25CB';
}

function showLoadingBtn(id) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.dataset.origText = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span> Загрузка...';
  btn.disabled = true;
  setTimeout(() => { btn.textContent = btn.dataset.origText; btn.disabled = false; }, 2000);

  if (el) el.innerHTML = '<div class="auth-alert auth-alert--danger"><span class="auth-alert__icon">\u26A0</span><span class="auth-alert__text">' + msg + '</span></div>';

  const el = document.getElementById(id);
  if (el) el.innerHTML = '<div class="auth-alert auth-alert--info"><span class="auth-alert__icon">\u2139</span><span class="auth-alert__text">' + msg + '</span></div>';

/* ==========================================================================
   ROUTER
   ========================================================================== */

function route() {
  const p = state.currentPage;
  let html = '';

  if (p === 'login') html = pageLogin();
  else if (p === 'register') html = pageRegister();
  else if (p === 'verify') html = pageVerify();
  else if (p === 'forgot') html = pageForgot();
  else if (p === 'forgot-verify') html = pageForgotVerify();
  else if (p === 'reset') html = pageReset();
  else if (p === 'account-deleted') html = pageAccountDeleted();
  else if (p === 'session-expired') html = pageSessionExpired();
  else if (p === 'blocked') html = pageBlocked();
  else if (p === 'error') html = pageGenericError();
  else if (p === 'settings-profile') html = pageSettingsProfile();
  else if (p === 'settings-security') html = pageSettingsSecurity();
  else if (p === 'tasks') html = pageTasksList();
  else if (p === 'task-detail') html = pageTaskDetail();
  else html = pageLogin();

  render(html);
  document.body.classList.toggle('task-detail-open', p === 'task-detail');
  if (document.querySelector('.code-input')) setTimeout(setupCodeInput, 50);
  if (p === 'tasks') requestAnimationFrame(function() { updateTaskFilterControls(false); renderTaskTiles(); initSearchPlaceholder(); });
  if (p === 'task-detail') window.scrollTo(0, 0);
}

let taskTilesResizeTimer = null;
window.addEventListener('resize', function() {
  if (state.currentPage !== 'tasks') return;
  clearTimeout(taskTilesResizeTimer);
  taskTilesResizeTimer = setTimeout(function() { recalcSegmentedControls(); renderTaskTiles(); }, 120);
});

// Init
route();
</script>
</body>
</html>
