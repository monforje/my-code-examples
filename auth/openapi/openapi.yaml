          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCodeRequest'
components:
  schemas:
    ChangePasswordRequest:
      type: object
      required:
        - current_password
      properties:
        current_password:
          type: string
    ChangePasswordTokenResponse:
      type: object
      required:
        - change_token
        - expires_in
      properties:
        change_token:
          type: string
        expires_in:
          type: integer
          format: int32
    CliRefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    CliRefreshResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_in
        - token_type
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          format: int32
        token_type:
          type: string
          enum:
            - Bearer
    CliTokenResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_in
        - token_type
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          format: int32
        token_type:
          type: string
          enum:
            - Bearer
    CodeVerifyRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
    CompleteEmailChangeRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
    CompletePasswordChangeRequest:
      type: object
      required:
        - change_token
        - new_password
      properties:
        change_token:
          type: string
        new_password:
          type: string
    ConfirmEmailChangeRequest:
      type: object
      required:
        - new_email
        - identity_token
      properties:
        new_email:
          type: string
        identity_token:
          type: string
    DeleteAccountRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
    DeviceConfirmRequest:
      type: object
      required:
        - user_code
      properties:
        user_code:
          type: string
    DeviceConfirmResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - confirmed
    DeviceStartResponse:
      type: object
      required:
        - device_code
        - user_code
        - verification_url
        - expires_in
        - interval
      properties:
        device_code:
          type: string
        user_code:
          type: string
        verification_url:
          type: string
        expires_in:
          type: integer
          format: int32
        interval:
          type: integer
          format: int32
    DeviceTokenRequest:
      type: object
      required:
        - device_code
      properties:
        device_code:
          type: string
    EmailChangeRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - INVALID_JSON
        - MISSING_AUTH_TOKEN
        - INVALID_AUTH_TOKEN
        - EXPIRED_AUTH_TOKEN
        - INVALID_REFRESH_TOKEN
        - EXPIRED_REFRESH_TOKEN
        - INVALID_CREDENTIALS
        - EMAIL_NOT_VERIFIED
        - EMAIL_ALREADY_EXISTS
        - INVALID_CODE
        - EXPIRED_CODE
        - TOO_MANY_ATTEMPTS
        - RATE_LIMITED
        - CURRENT_PASSWORD_INCORRECT
        - RESET_TOKEN_INVALID
        - RESET_TOKEN_EXPIRED
        - NOT_FOUND
        - INTERNAL_ERROR
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    ForgotVerifyRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
        code:
          type: string
    Identity:
      type: object
      required:
        - id
        - email
        - email_verified
        - status
        - created_at
      properties:
        id:
          type: string
        email:
          type: string
        email_verified:
          type: boolean
        status:
          type: string
          enum:
            - pending_verification
            - active
            - blocked
            - deleted
        created_at:
          type: string
          format: date-time
    IdentityTokenResponse:
      type: object
      required:
        - identity_token
        - expires_in
      properties:
        identity_token:
          type: string
        expires_in:
          type: integer
          format: int32
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    RefreshResponse:
      type: object
      required:
        - access_token
        - expires_in
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
          format: int32
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    RegisterResponse:
      type: object
      required:
        - identity_id
        - email
        - status
      properties:
        identity_id:
          type: string
        email:
          type: string
        status:
          type: string
          enum:
            - pending_verification
    ResendCodeRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    ResendEmailChangeCodeRequest:
      type: object
      required:
        - step
      properties:
        step:
          type: string
          enum:
            - current
            - new
    ResetPasswordRequest:
      type: object
      required:
        - reset_token
        - new_password
      properties:
        reset_token:
          type: string
        new_password:
          type: string
    ResetTokenResponse:
      type: object
      required:
        - reset_token
        - expires_in
      properties:
        reset_token:
          type: string
        expires_in:
          type: integer
          format: int32
    TokenResponse:
      type: object
      required:
        - access_token
        - expires_in
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
          format: int32
    VerifyCodeRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
        code:
          type: string
  securitySchemes:
    BearerAuth:
      type: http
      scheme: Bearer
